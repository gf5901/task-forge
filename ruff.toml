target-version = "py39"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (unused imports, undefined names)
    "I",   # isort
    "UP",  # pyupgrade (but capped at py39 target)
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long — formatter handles this
    "B008",   # function calls in default args — FastAPI/Depends pattern
    "SIM108", # ternary operator — readability preference
    "UP007",  # X | Y union syntax — not valid in Python 3.9
    "UP006",  # list/dict builtins as generics — not valid in Python 3.9
    "UP035",  # typing.List/Dict deprecated — required for Python 3.9
    "UP031",  # %-formatting — codebase convention, not migrating
    "E402",   # module-level import not at top — router/lazy import pattern
]

[lint.per-file-ignores]
"tests/*" = ["S101"]  # assert is fine in tests

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-test:
    name: Python tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -n auto \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.15,<1"

      - name: Run ruff
        run: ruff check src/ tests/

  frontend-check:
    name: Frontend (tsc + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

  lambda-api-test:
    name: Lambda API (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: infra/packages/api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: infra/packages/api

      - name: TypeScript check
        run: npm run typecheck
        working-directory: infra/packages/api

      - name: ESLint
        run: npm run lint
        working-directory: infra/packages/api

      - name: Unit tests
        run: npm test
        working-directory: infra/packages/api

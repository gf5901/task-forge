<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Task Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:       #0c0c0c;
  --bg-card:  #161618;
  --bg-input: #1a1a1d;
  --border:   #26262a;
  --text:     #ececef;
  --text-2:   #8b8b93;
  --text-3:   #55555e;
  --accent:   #7b61ff;
  --accent-h: #6950e0;
  --red:      #e5484d;
  --radius:   6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.5}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{width:100%;max-width:360px}
.login-brand{display:flex;align-items:center;justify-content:center;gap:10px;font-size:16px;font-weight:600;margin-bottom:32px}
.login-error{padding:10px 14px;border-radius:var(--radius);background:rgba(229,72,77,.12);border:1px solid rgba(229,72,77,.25);color:var(--red);font-size:12px;margin-bottom:18px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;color:var(--text-2);margin-bottom:6px}
.field input{width:100%;padding:10px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s;min-height:44px}
.field input:focus{border-color:var(--accent)}
.btn-submit{width:100%;padding:10px 24px;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:background .15s;min-height:44px;margin-top:6px}
.btn-submit:hover{background:var(--accent-h)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <svg width="24" height="24" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="5" fill="#7b61ff"/><path d="M6 10h8M10 6v8" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
      Task Forge
    </div>
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>

{% extends "base.html" %}
{% set current_status = '' %}
{% block title %}New Task{% endblock %}
{% block content %}
<div class="form-page">
  <a class="back-link" href="/tasks">← Back to tasks</a>
  <h1>New Task</h1>
  <form method="post" action="/tasks" hx-boost="true">
    <div class="field">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" required autofocus placeholder="What needs to be done?">
    </div>
    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Add details, context, acceptance criteria…"></textarea>
    </div>
    <div class="field">
      <label for="priority">Priority</label>
      <select id="priority" name="priority">
        {% for p in priorities %}
        <option value="{{ p }}"{% if p == 'medium' %} selected{% endif %}>{{ p | capitalize }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="tags">Tags</label>
      <input type="text" id="tags" name="tags" placeholder="backend, security, docs">
      <div class="hint">Comma-separated</div>
    </div>
    <div class="field">
      <label for="repo_select">Target repository</label>
      <select id="repo_select" onchange="toggleNewRepo(this)">
        <option value="">None (this repo)</option>
        {% for repo in repos %}
        <option value="{{ repo }}">{{ repo }}</option>
        {% endfor %}
        <option value="__new__">+ New repo…</option>
      </select>
      <input type="text" id="new_repo_input" placeholder="owner/repo or /path/to/local/repo" style="display:none;margin-top:8px">
      <input type="hidden" id="target_repo" name="target_repo" value="">
      <div class="hint">The repo where the agent should execute this task</div>
    </div>
    <script>
    function toggleNewRepo(sel){
      var inp=document.getElementById('new_repo_input');
      var hid=document.getElementById('target_repo');
      if(sel.value==='__new__'){
        inp.style.display='';
        inp.required=true;
        inp.focus();
        hid.value='';
      }else{
        inp.style.display='none';
        inp.required=false;
        inp.value='';
        hid.value=sel.value;
      }
    }
    document.getElementById('new_repo_input').addEventListener('input',function(){
      document.getElementById('target_repo').value=this.value;
    });
    </script>
    <button type="submit" class="btn-submit">Create Task</button>
  </form>
</div>
{% endblock %}
